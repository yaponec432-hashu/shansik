name: uptime
on:
  schedule:
    - cron: '29 11 14 * *'

permissions:
  contents: write

jobs:
  save-uptime:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get uptime
        run: |
          link='https://raw.githubusercontent.com/Sekai-World'
          link="${link}/uptime-monitor/master/history/summary.json"
          uptime="$(curl ${link} | grep -m1 'uptimeMonth')"
          printf "###### sekai.best\n%s $(date)\n" "${uptime}" > README.md

      - name: Save uptime
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email \
            '41898282+github-actions[bot]@users.noreply.github.com'
          git add ./README.md
          git commit -m "Uptime $(date -I)"
          git push

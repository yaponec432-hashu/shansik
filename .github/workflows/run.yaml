name: run
on:
  schedule:
    - cron: '29 23,01,04,07,11,15,19 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        run: bash -c "$(curl -Lf https://astral.sh/uv/install.sh)"

      - name: Run python
        run: |
          uv run ./master.py &
          master_id_file='./master_id'
          until [[ -r "${master_id_file}" ]]; do
            sleep 1
          done
          export MASTER_ID="$(cat ${master_id_file})"
          echo "${MASTER_ID}"
          wait
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_SYNC_ENABLED: 0
